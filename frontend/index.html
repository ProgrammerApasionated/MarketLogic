<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>MarketLogic – Tu camino profesional</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<!-- LOGO SUPERIOR -->
<header class="header">
<img src="logo.png" alt="MarketLogic Logo" class="logo">
<p class="frase-motivadora">Tu camino profesional.</p>
</header>
 <!-- CONTENEDOR DEL CHAT -->
<main class="chat-container">
    <!-- MENSAJES DEL CHATBOT Y DEL USUARIO -->
  <div id="messages" class="messages"></div>

<!-- INPUT + BOTÓN -->
<div class="input-area">
  <textarea id="input" class="message-area" placeholder="¿Qué te gustaría explorar hoy?"></textarea>
 <div class="button-group">
  <button class="btn btn-secondary" type="button">Presentación</button>
  <button class="btn btn-primary" type="button">Enviar</button>
</div>
</main>
  <!-- Archivo JavaScript que gestiona la lógica -->
  <script src="app.js"></script>
</body>
</html>
