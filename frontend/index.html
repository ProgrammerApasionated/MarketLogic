<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>MarketLogic – Tu camino profesional</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<!-- LOGO SUPERIOR -->
<header class="header">
<img src="logo.png" alt="MarketLogic Logo" class="logo">
<p class="frase-motivadora">Tu camino profesional.</p>
</header>
<img src="icono.png" alt="MarketLogic Icon" class="logo-secundario">
 <!-- CONTENEDOR DEL CHAT -->
<main class="chat-container">
    <!-- MENSAJES DEL CHATBOT Y DEL USUARIO -->
  <div id="messages" class="messages"></div>

<!-- INPUT + BOTÓN -->
<div class="input-area">
  <textarea id="input" placeholder="¿Qué te gustaría explorar hoy?"></textarea>
 <div class="button-group">
  <button id="presentacion" class="btn btn-secondary" type="button">Presentación</button>
  <button id="btn" class="btn btn-primary" type="button">Enviar</button>
 </div>
</div>
</main>
  <!-- Archivo JavaScript que gestiona la lógica -->
<script src="app.js" defer></script>
</body>
</html>
